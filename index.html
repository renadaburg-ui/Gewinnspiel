
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Renada Burg Gutscheinspiel</title>

<style>
body{
font-family:Arial;
background:linear-gradient(45deg,#ff512f,#f9d423,#24c6dc);
margin:0;
text-align:center;
color:white;
}

.banner{
margin-top:20px;
cursor:pointer;
}

.banner img{
width:220px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,200px);
gap:30px;
justify-content:center;
margin-top:40px;
}

.box{
width:200px;
height:200px;
border-radius:30px;
background:white;
box-shadow:0 15px 35px rgba(0,0,0,0.4);
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
transition:0.3s;
}

.box:hover{transform:scale(1.08);}

.logo{width:70%;}

.card{
background:rgba(255,255,255,0.15);
padding:30px;
border-radius:20px;
max-width:500px;
margin:auto;
margin-top:40px;
}

input{
padding:12px;
margin:10px;
width:260px;
border-radius:10px;
border:none;
font-size:16px;
}

button{
padding:14px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#00c853;
color:white;
cursor:pointer;
}

.voucher{font-size:34px;color:yellow;margin:20px;}

.page{display:none;}
.active{display:block;}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px 20px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}
</style>
</head>
